name: Update README

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '*/5 * * * *'
    #- cron: '0 0 */1 * *'
permissions:
  contents: write

jobs:
  markscribe:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: muesli/readme-scribe@5a187a2a36ef894335f17a7d01c32b0e28c6d948 # v0.1
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        with:
          template: "templates/README.md.tpl"
          writeTo: "README.md"
          
      - name: Inject waka markers into README
        run: |
          sed -i 's/📊 \*\*\&nbsp;this week i spent my time on:\*\*/📊 **\&nbsp;this week i spent my time on:**\n\n<!--START_SECTION:waka-->\n<!--END_SECTION:waka-->/' README.md
          sed -i 's/📺\&nbsp;Latest YouTube Videos/📺\&nbsp;Latest YouTube Videos\n\n<!-- YOUTUBE:START -->\n<!-- YOUTUBE:END -->/' README.md
      - uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d
        with:
          commit_message: 'Update generated README'
          branch: main
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
